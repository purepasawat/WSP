<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Schedule Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #8C8C8C;
            --primary-dark: #6B6B6B;
            --primary-light: #A8A8A8;
            --secondary-color: #5A5A5A;
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e8e8e8;
            --text-primary: #2a2a2a;
            --text-secondary: #666666;
            --border-color: #d0d0d0;
            --shadow-color: rgba(140, 140, 140, 0.15);
            --card-bg: #ffffff;
            --hover-bg: #f9f9f9;
        }
        
        [data-theme="dark"] {
            --primary-color: #C4C4C4;
            --primary-dark: #8C8C8C;
            --primary-light: #D8D8D8;
            --secondary-color: #A8A8A8;
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --bg-tertiary: #3a3a3a;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --border-color: #4a4a4a;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --card-bg: #2a2a2a;
            --hover-bg: #353535;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-secondary);
            padding: 20px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 32px var(--shadow-color);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: white;
            color: var(--primary-color);
        }
        .btn-primary:hover {
            background: var(--bg-tertiary);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .btn-success {
            background: var(--primary-color);
            color: white;
        }
        .btn-success:hover {
            background: var(--primary-dark);
        }
        .btn-info {
            background: #6B6B6B;
            color: white;
        }
        .btn-info:hover {
            background: #5A5A5A;
        }
        .btn-danger {
            background: #D12500;
            color: white;
        }
        .btn-danger:hover {
            background: #A01D00;
        }
        .content {
            padding: 30px;
        }
        .task-form {
            background: var(--bg-tertiary);
            padding: 25px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            margin-bottom: 30px;
        }
        .task-form h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(140, 140, 140, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .duration-input-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .duration-input-group input {
            flex: 1;
        }
        .duration-input-group select {
            flex: 0.6;
        }
        .calculated-end-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            display: inline-block;
        }
        .task-list {
            margin-bottom: 30px;
        }
        .task-item {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-item:hover {
            box-shadow: 0 4px 12px var(--shadow-color);
            transform: translateX(5px);
        }
        .task-info {
            flex: 1;
        }
        .task-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        .task-details {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .task-description {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-style: italic;
        }
        .task-actions {
            display: flex;
            gap: 8px;
        }
        .task-actions .btn {
            padding: 6px 12px;
            font-size: 12px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .gantt-container {
            margin-top: 30px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            overflow: hidden;
        }
        .gantt-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .gantt-period-selector {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 6px;
        }
        .period-btn {
            padding: 6px 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .period-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .period-btn.active {
            background: white;
            color: var(--primary-color);
            border-color: white;
        }
        .gantt-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
        }
        .gantt-chart {
            display: flex;
            flex-direction: column;
            min-width: max-content;
        }
        .gantt-timeline {
            display: flex;
            background: var(--bg-tertiary);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .gantt-task-labels {
            min-width: 250px;
            background: var(--bg-tertiary);
            border-right: 2px solid var(--border-color);
            padding: 10px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .gantt-dates {
            display: flex;
            flex: 1;
        }
        .gantt-time-slot {
            min-width: 60px;
            padding: 8px 5px;
            text-align: center;
            font-size: 10px;
            border-right: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            line-height: 1.4;
        }
        .gantt-time-slot .date {
            font-weight: 700;
            font-size: 11px;
            margin-bottom: 3px;
        }
        .gantt-time-slot .time {
            font-size: 10px;
            color: var(--text-secondary);
        }
        .gantt-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            min-height: 50px;
            align-items: center;
        }
        .gantt-row:hover {
            background: var(--hover-bg);
        }
        .gantt-task-label {
            min-width: 250px;
            padding: 10px;
            border-right: 2px solid var(--border-color);
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }
        .gantt-task-label-name {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 600;
        }
        .gantt-task-label-person {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 3px;
        }
        .gantt-bars {
            display: flex;
            flex: 1;
            position: relative;
        }
        .gantt-bar-container {
            display: flex;
            width: 100%;
            position: relative;
        }
        .gantt-time-cell {
            min-width: 60px;
            height: 50px;
            border-right: 1px solid var(--border-color);
        }
        .gantt-bar {
            position: absolute;
            height: 30px;
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: 600;
            box-shadow: 0 2px 6px var(--shadow-color);
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            white-space: nowrap;
        }
        .gantt-bar:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 4px 12px var(--shadow-color);
            z-index: 5;
            filter: brightness(1.1);
        }
        .progress-indicator {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px 0 0 4px;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-not-started {
            background: #ffebee;
            color: #c62828;
        }
        .status-in-progress {
            background: #fff3e0;
            color: #ef6c00;
        }
        .status-completed {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .work-type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .work-type-normal {
            background: #e3f2fd;
            color: #1565c0;
        }
        .work-type-work-at-high {
            background: #fff3e0;
            color: #ef6c00;
        }
        .work-type-confine {
            background: #fce4ec;
            color: #c2185b;
        }
        .work-type-class-i {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        .work-type-class-ii {
            background: #ede7f6;
            color: #5e35b1;
        }
        .pic-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }
        .color-option:hover {
            transform: scale(1.15);
        }
        .color-option.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 4px var(--primary-color);
        }
        .color-option[data-color="#000000"] {
            border: 2px solid var(--border-color);
        }
        .project-info {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid var(--border-color);
        }
        .project-info h3 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--primary-color);
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .hour-selector {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .hour-selector input[type="date"] {
            flex: 1;
        }
        .hour-selector select {
            flex: 0.4;
        }
        
        /* PDF Print Styles */
        @media print {
            @page {
                size: A3 landscape;
                margin: 15mm;
            }
            
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .container {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            
            .header,
            .header-buttons,
            .task-form,
            .task-list,
            .project-info,
            .gantt-period-selector,
            .task-actions {
                display: none !important;
            }
            
            .content {
                padding: 0;
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            
            .gantt-container {
                border: none;
                border-radius: 0;
                margin: 0;
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            
            /* PDF Header */
            .pdf-header {
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                padding: 10px 0;
                border-bottom: 2px solid #8C8C8C;
                margin-bottom: 15px;
                font-size: 11px;
                color: #000;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .pdf-header-item {
                display: flex;
                align-items: center;
                gap: 5px;
            }
            
            .pdf-header-label {
                font-weight: 700;
                color: #8C8C8C;
            }
            
            .pdf-header-value {
                font-weight: 500;
                color: #000;
            }
            
            /* PDF Body - Gantt Chart */
            .gantt-wrapper {
                overflow: visible !important;
                flex: 1;
            }
            
            .gantt-header {
                display: none !important;
            }
            
            .gantt-chart {
                width: 100% !important;
                min-width: 100% !important;
            }
            
            .gantt-timeline,
            .gantt-row {
                page-break-inside: avoid;
            }
            
            .gantt-task-labels,
            .gantt-task-label {
                background: #f5f5f5 !important;
                min-width: 180px !important;
            }
            
            .gantt-time-slot {
                min-width: 50px !important;
                background: #f5f5f5 !important;
            }
            
            .gantt-bar {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
                color-adjust: exact;
            }
            
            /* PDF Footer */
            .pdf-footer {
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                padding: 10px 0;
                border-top: 2px solid #8C8C8C;
                margin-top: 15px;
                font-size: 11px;
                color: #000;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .pdf-footer-item {
                display: flex;
                align-items: center;
                gap: 5px;
            }
            
            .pdf-footer-label {
                font-weight: 700;
                color: #8C8C8C;
            }
            
            .pdf-footer-value {
                font-weight: 500;
                color: #000;
            }
        }
        
        /* Hide PDF elements on screen */
        .pdf-header,
        .pdf-footer {
            display: none;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .gantt-task-labels,
            .gantt-task-label {
                min-width: 150px;
            }
            .button-group {
                flex-direction: column;
            }
            .gantt-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .gantt-period-selector {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Work Schedule Planner</h1>
            <div class="header-buttons">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">Dark</span>
                </button>
                <button class="btn btn-secondary" onclick="saveProject()">
                    💾 Save Project
                </button>
                <button class="btn btn-secondary" onclick="loadProject()">
                    📂 Load Project
                </button>
                <button class="btn btn-primary" onclick="printToPDF()">
                    📄 Export to PDF
                </button>
            </div>
        </div>
        <div class="content">
            <!-- PDF Header (only visible when printing) -->
            <div class="pdf-header">
                <div class="pdf-header-item">
                    <span class="pdf-header-label">Project:</span>
                    <span class="pdf-header-value" id="pdf-project-name"></span>
                </div>
                <div class="pdf-header-item">
                    <span class="pdf-header-label">Manager:</span>
                    <span class="pdf-header-value" id="pdf-project-manager"></span>
                </div>
                <div class="pdf-header-item">
                    <span class="pdf-header-label">Start:</span>
                    <span class="pdf-header-value" id="pdf-project-start"></span>
                </div>
                <div class="pdf-header-item">
                    <span class="pdf-header-label">End:</span>
                    <span class="pdf-header-value" id="pdf-project-end"></span>
                </div>
            </div>
            
            <div class="project-info">
                <h3>Project Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="projectName" placeholder="Enter project name" value="Manufacturing Line Upgrade">
                    </div>
                    <div class="form-group">
                        <label>Project Manager</label>
                        <input type="text" id="projectManager" placeholder="Enter manager name" value="John Smith">
                    </div>
                    <div class="form-group">
                        <label>Project Start Date</label>
                        <input type="date" id="projectStartDate">
                    </div>
                    <div class="form-group">
                        <label>Project End Date</label>
                        <input type="date" id="projectEndDate">
                    </div>
                </div>
                <div id="statsContainer" class="stats" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-value" id="totalTasks">0</div>
                        <div class="stat-label">Total Tasks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="completedTasks">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="inProgressTasks">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="notStartedTasks">0</div>
                        <div class="stat-label">Not Started</div>
                    </div>
                </div>
            </div>
            <div class="task-form">
                <h2>➕ Add New Task</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Task Name *</label>
                        <input type="text" id="taskName" placeholder="Enter task name" required>
                    </div>
                    <div class="form-group">
                        <label>PIC (Person In Charge) *</label>
                        <select id="pic" required>
                            <option value="">Select PIC</option>
                            <option value="OPE">OPE</option>
                            <option value="ME">ME</option>
                            <option value="IE">IE</option>
                            <option value="EE">EE</option>
                            <option value="ENG">ENG</option>
                            <option value="PROJ">PROJ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Date & Hour *</label>
                        <div class="hour-selector">
                            <input type="date" id="startDate" required oninput="updateEndDate()">
                            <select id="startHour" required onchange="updateEndDate()">
                                <option value="">Hour</option>
                                <option value="00">00:00</option>
                                <option value="01">01:00</option>
                                <option value="02">02:00</option>
                                <option value="03">03:00</option>
                                <option value="04">04:00</option>
                                <option value="05">05:00</option>
                                <option value="06">06:00</option>
                                <option value="07">07:00</option>

                                <option value="09">09:00</option>
                                <option value="10">10:00</option>
                                <option value="11">11:00</option>
                                <option value="12">12:00</option>
                                <option value="13">13:00</option>
                                <option value="14">14:00</option>
                                <option value="15">15:00</option>
                                <option value="16">16:00</option>
                                <option value="17">17:00</option>
                                <option value="18">18:00</option>
                                <option value="19">19:00</option>
                                <option value="20">20:00</option>
                                <option value="21">21:00</option>
                                <option value="22">22:00</option>
                                <option value="23">23:00</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Duration *</label>
                        <div class="duration-input-group">
                            <input type="number" id="duration" min="0.5" step="0.5" value="8" required oninput="updateEndDate()">
                            <select id="durationUnit" onchange="updateEndDate()">
                                <option value="hours">Hours</option>
                                <option value="days">Days</option>
                            </select>
                        </div>
                        <div class="calculated-end-time" id="calculatedEndTime">End: ---</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option value="not-started">Not Started</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Progress (%)</label>
                        <input type="number" id="progress" min="0" max="100" value="0">
                    </div>
                    <div class="form-group">
                        <label>Work Type</label>
                        <select id="workType">
                            <option value="normal">Normal</option>
                            <option value="work-at-high">Work at High</option>
                            <option value="confine">Confine</option>
                            <option value="class-i">Class I</option>
                            <option value="class-ii">Class II</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <div class="color-picker">
                            <div class="color-option" style="background: #000000;" data-color="#000000" title="Black"></div>
                            <div class="color-option" style="background: #D12500;" data-color="#D12500" title="Red"></div>
                            <div class="color-option selected" style="background: #D17D00;" data-color="#D17D00" title="Orange/Gold"></div>
                            <div class="color-option" style="background: #96D100;" data-color="#96D100" title="Green"></div>
                            <div class="color-option" style="background: #00D188;" data-color="#00D188" title="Teal"></div>
                            <div class="color-option" style="background: #005ED1;" data-color="#005ED1" title="Blue"></div>
                            <div class="color-option" style="background: #6C00D1;" data-color="#6C00D1" title="Purple"></div>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Description</label>
                        <textarea id="description" placeholder="Enter task description (optional)"></textarea>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="addTask()">
                        ✅ Add Task
                    </button>
                    <button class="btn btn-info" onclick="addTaskContinue()">
                        ➕ Add & Continue
                    </button>
                </div>
            </div>
            <div class="task-list" id="taskList"></div>
            <div class="gantt-container">
                <div class="gantt-header">
                    <span>📊 Gantt Chart View</span>
                    <div class="gantt-period-selector">
                        <button class="period-btn" onclick="setGanttPeriod(1)">1H</button>
                        <button class="period-btn" onclick="setGanttPeriod(2)">2H</button>
                        <button class="period-btn" onclick="setGanttPeriod(4)">4H</button>
                        <button class="period-btn" onclick="setGanttPeriod(12)">12H</button>
                        <button class="period-btn active" onclick="setGanttPeriod(24)">24H</button>
                    </div>
                </div>
                <div class="gantt-wrapper">
                    <div id="ganttChart"></div>
                </div>
            </div>
            
            <!-- PDF Footer (only visible when printing) -->
            <div class="pdf-footer">
                <div class="pdf-footer-item">
                    <span class="pdf-footer-label">Total Tasks:</span>
                    <span class="pdf-footer-value" id="pdf-total-tasks"></span>
                </div>
                <div class="pdf-footer-item">
                    <span class="pdf-footer-label">Total Hours:</span>
                    <span class="pdf-footer-value" id="pdf-total-hours"></span>
                </div>
                <div class="pdf-footer-item">
                    <span class="pdf-footer-label">Total Days:</span>
                    <span class="pdf-footer-value" id="pdf-total-days"></span>
                </div>
                <div class="pdf-footer-item">
                    <span class="pdf-footer-label">PICs:</span>
                    <span class="pdf-footer-value" id="pdf-all-pics"></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        let tasks = [];
        let selectedColor = '#D17D00'; // Default to orange/gold
        let editingTaskId = null;
        let ganttPeriodHours = 24;
        let currentTheme = 'light';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadFromLocalStorage();
            setupColorPicker();
            setupDateDefaults();
            renderTasks();
            renderGanttChart();
            updateStats();
        });
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            currentTheme = savedTheme;
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton();
        }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeButton();
        }
        
        function updateThemeButton() {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (currentTheme === 'dark') {
                icon.textContent = '☀️';
                text.textContent = 'Light';
            } else {
                icon.textContent = '🌙';
                text.textContent = 'Dark';
            }
        }
        
        function setupDateDefaults() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 7);
            if (!document.getElementById('projectStartDate').value) {
                document.getElementById('projectStartDate').value = formatDate(today);
            }
            if (!document.getElementById('projectEndDate').value) {
                document.getElementById('projectEndDate').value = formatDate(new Date(today.getTime() + 90 * 24 * 60 * 60 * 1000));
            }
            document.getElementById('startDate').value = formatDate(today);
            document.getElementById('startHour').value = '08';
            updateEndDate();
        }
        
        function setupColorPicker() {
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedColor = this.getAttribute('data-color');
                });
            });
        }
        
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }
        
        function formatDateTime(date, hour) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(hour).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:00`;
        }
        
        function updateEndDate() {
            const startDateStr = document.getElementById('startDate').value;
            const startHour = document.getElementById('startHour').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const durationUnit = document.getElementById('durationUnit').value;
            
            if (!startDateStr || !startHour || !duration) {
                document.getElementById('calculatedEndTime').textContent = 'End: ---';
                return;
            }
            
            const startDateTime = formatDateTime(new Date(startDateStr), parseInt(startHour));
            const start = new Date(startDateTime);
            let end = new Date(start);
            
            if (durationUnit === 'hours') {
                end.setHours(end.getHours() + duration);
            } else if (durationUnit === 'days') {
                end.setDate(end.getDate() + duration);
            }
            
            document.getElementById('calculatedEndTime').textContent =
                `End: ${formatDateTimeDisplay(end.toISOString())}`;
        }
        
        function calculateEndDate(startDateStr, startHour, duration, unit) {
            const startDateTime = formatDateTime(new Date(startDateStr), parseInt(startHour));
            const start = new Date(startDateTime);
            const end = new Date(start);
            
            if (unit === 'hours') {
                end.setHours(end.getHours() + duration);
            } else if (unit === 'days') {
                end.setDate(end.getDate() + duration);
            }
            return end.toISOString();
        }
        
        function setGanttPeriod(hours) {
            ganttPeriodHours = hours;
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderGanttChart();
        }
        
        function addTask() {
            addTaskInternal(false);
        }
        
        function addTaskContinue() {
            addTaskInternal(true);
        }
        
        function addTaskInternal(continueFromLast) {
            const taskName = document.getElementById('taskName').value.trim();
            const pic = document.getElementById('pic').value;
            let startDateStr = document.getElementById('startDate').value;
            let startHour = document.getElementById('startHour').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const durationUnit = document.getElementById('durationUnit').value;
            const status = document.getElementById('status').value;
            const progress = parseInt(document.getElementById('progress').value);
            const workType = document.getElementById('workType').value;
            const description = document.getElementById('description').value.trim();
            
            if (continueFromLast && tasks.length > 0) {
                const lastTask = tasks[tasks.length - 1];
                const lastEnd = new Date(lastTask.endDate);
                startDateStr = formatDate(lastEnd);
                startHour = String(lastEnd.getHours()).padStart(2, '0');
                document.getElementById('startDate').value = startDateStr;
                document.getElementById('startHour').value = startHour;
                updateEndDate();
            }
            
            if (!taskName || !pic || !startDateStr || !startHour || !duration) {
                alert('Please fill in all required fields (Task Name, PIC, Start Date & Hour, Duration)');
                return;
            }
            
            const startDate = formatDateTime(new Date(startDateStr), parseInt(startHour));
            const endDate = calculateEndDate(startDateStr, startHour, duration, durationUnit);
            
            if (new Date(startDate) > new Date(endDate)) {
                alert('End date must be after start date');
                return;
            }
            
            const task = {
                id: editingTaskId || Date.now(),
                name: taskName,
                pic: pic,
                startDate: startDate,
                endDate: endDate,
                duration: duration,
                durationUnit: durationUnit,
                status: status,
                progress: progress,
                workType: workType,
                description: description,
                color: selectedColor
            };
            
            if (editingTaskId) {
                const index = tasks.findIndex(t => t.id === editingTaskId);
                tasks[index] = task;
                editingTaskId = null;
            } else {
                tasks.push(task);
            }
            
            clearForm(continueFromLast);
            renderTasks();
            renderGanttChart();
            updateStats();
            saveToLocalStorage();
        }
        
        function clearForm(keepStartDate = false) {
            document.getElementById('taskName').value = '';
            document.getElementById('pic').value = '';
            document.getElementById('description').value = '';
            document.getElementById('status').value = 'not-started';
            document.getElementById('progress').value = '0';
            document.getElementById('workType').value = 'normal';
            document.getElementById('duration').value = '8';
            document.getElementById('durationUnit').value = 'hours';
            if (!keepStartDate) {
                setupDateDefaults();
            } else {
                updateEndDate();
            }
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            document.querySelector('.color-option[data-color="#D17D00"]').classList.add('selected');
            selectedColor = '#D17D00';
            if (!keepStartDate) {
                editingTaskId = null;
                document.querySelector('.task-form h2').textContent = '➕ Add New Task';
                document.querySelector('.task-form .btn-success').textContent = '✅ Add Task';
            }
        }
        
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            
            const startDate = new Date(task.startDate);
            document.getElementById('taskName').value = task.name;
            document.getElementById('pic').value = task.pic;
            document.getElementById('startDate').value = formatDate(startDate);
            document.getElementById('startHour').value = String(startDate.getHours()).padStart(2, '0');
            document.getElementById('duration').value = task.duration;
            document.getElementById('durationUnit').value = task.durationUnit;
            document.getElementById('status').value = task.status;
            document.getElementById('progress').value = task.progress;
            document.getElementById('workType').value = task.workType;
            document.getElementById('description').value = task.description;
            updateEndDate();
            document.querySelectorAll('.color-option').forEach(o => {
                o.classList.remove('selected');
                if (o.getAttribute('data-color') === task.color) {
                    o.classList.add('selected');
                }
            });
            selectedColor = task.color;
            editingTaskId = id;
            document.querySelector('.task-form h2').textContent = '✏️ Edit Task';
            document.querySelector('.task-form .btn-success').textContent = '💾 Update Task';
            document.querySelector('.task-form').scrollIntoView({ behavior: 'smooth' });
        }
        
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
                renderGanttChart();
                updateStats();
                saveToLocalStorage();
            }
        }
        
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="9"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <h3>No tasks yet</h3>
                        <p>Add your first task to get started with your project plan</p>
                    </div>
                `;
                return;
            }
            taskList.innerHTML = tasks.map(task => `
                <div class="task-item" style="border-left-color: ${task.color}">
                    <div class="task-info">
                        <div class="task-name">${task.name}</div>
                        <div class="task-details">
                            <span class="pic-badge">👤 ${task.pic}</span>
                            <span>📅 ${formatDateTimeDisplay(task.startDate)}</span>
                            <span>→ ${formatDateTimeDisplay(task.endDate)}</span>
                            <span>⏱️ ${task.duration} ${task.durationUnit}</span>
                            <span>📊 ${task.progress}%</span>
                            <span class="status-badge status-${task.status}">${getStatusText(task.status)}</span>
                            <span class="work-type-badge work-type-${task.workType}">🔧 ${getWorkTypeText(task.workType)}</span>
                        </div>
                        ${task.description ? `<div class="task-description">${task.description}</div>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-primary" onclick="editTask(${task.id})">✏️ Edit</button>
                        <button class="btn btn-danger" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function formatDateTimeDisplay(dateTimeString) {
            const date = new Date(dateTimeString);
            const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            return `${dateStr} ${timeStr}`;
        }
        
        function getStatusText(status) {
            const statusMap = {
                'not-started': 'Not Started',
                'in-progress': 'In Progress',
                'completed': 'Completed'
            };
            return statusMap[status] || status;
        }
        
        function getWorkTypeText(workType) {
            const workTypeMap = {
                'normal': 'Normal',
                'work-at-high': 'Work at High',
                'confine': 'Confine',
                'class-i': 'Class I',
                'class-ii': 'Class II'
            };
            return workTypeMap[workType] || workType;
        }
        
        function renderGanttChart() {
            const ganttChart = document.getElementById('ganttChart');
            if (tasks.length === 0) {
                ganttChart.innerHTML = `
                    <div class="empty-state">
                        <p>Add tasks to see the Gantt chart visualization</p>
                    </div>
                `;
                return;
            }
            
            const allDates = tasks.flatMap(t => [new Date(t.startDate), new Date(t.endDate)]);
            const minDateTime = new Date(Math.min(...allDates));
            const maxDateTime = new Date(Math.max(...allDates));
            
            minDateTime.setMinutes(0, 0, 0);
            maxDateTime.setMinutes(0, 0, 0);
            maxDateTime.setHours(maxDateTime.getHours() + ganttPeriodHours);
            
            const timeSlots = [];
            const slotWidth = 60;
            for (let time = new Date(minDateTime); time < maxDateTime; time.setHours(time.getHours() + ganttPeriodHours)) {
                timeSlots.push(new Date(time));
            }
            
            let html = '<div class="gantt-chart">';
            html += '<div class="gantt-timeline">';
            html += '<div class="gantt-task-labels">Task Name</div>';
            html += '<div class="gantt-dates">';
            timeSlots.forEach(time => {
                const dateStr = time.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric'
                });
                const timeStr = time.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
                html += `<div class="gantt-time-slot">
                    <span class="date">${dateStr}</span>
                    <span class="time">${timeStr}</span>
                </div>`;
            });
            html += '</div></div>';
            
            tasks.forEach(task => {
                const taskStart = new Date(task.startDate);
                const taskEnd = new Date(task.endDate);
                const hoursFromStart = (taskStart - minDateTime) / (1000 * 60 * 60);
                const taskDurationHours = (taskEnd - taskStart) / (1000 * 60 * 60);
                const pixelsPerHour = slotWidth / ganttPeriodHours;
                const startOffset = hoursFromStart * pixelsPerHour;
                const barWidth = taskDurationHours * pixelsPerHour;
                
                html += '<div class="gantt-row">';
                html += `<div class="gantt-task-label">
                    <span class="gantt-task-label-name">${task.name}</span>
                    <span class="gantt-task-label-person">PIC: ${task.pic} | ${task.duration} ${task.durationUnit}</span>
                </div>`;
                html += '<div class="gantt-bars">';
                html += '<div class="gantt-bar-container">';
                timeSlots.forEach(() => {
                    html += '<div class="gantt-time-cell"></div>';
                });
                const barLabel = barWidth > 80 ? task.name : (barWidth > 40 ? task.name.substring(0, 10) + '...' : '');
                const textColor = getTextColor(task.color);
                html += `<div class="gantt-bar" style="left: ${startOffset}px; width: ${Math.max(barWidth, 5)}px; background: ${task.color}; color: ${textColor};" title="${task.name}&#10;Start: ${formatDateTimeDisplay(task.startDate)}&#10;End: ${formatDateTimeDisplay(task.endDate)}&#10;Duration: ${task.duration} ${task.durationUnit}">
                    <div class="progress-indicator" style="width: ${task.progress}%;"></div>
                    ${barLabel}
                </div>`;
                html += '</div></div></div>';
            });
            html += '</div>';
            ganttChart.innerHTML = html;
        }
        
        function getTextColor(bgColor) {
            // Convert hex to RGB
            const hex = bgColor.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            
            // Calculate brightness
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            
            // Return white for dark colors, black for light colors
            return brightness < 128 ? '#ffffff' : '#000000';
        }
        
        function updateStats() {
            if (tasks.length === 0) {
                document.getElementById('statsContainer').style.display = 'none';
                return;
            }
            document.getElementById('statsContainer').style.display = 'grid';
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'completed').length;
            document.getElementById('inProgressTasks').textContent = tasks.filter(t => t.status === 'in-progress').length;
            document.getElementById('notStartedTasks').textContent = tasks.filter(t => t.status === 'not-started').length;
        }
        
        function calculateTotalHours() {
            return tasks.reduce((total, task) => {
                const hours = task.durationUnit === 'hours' ? task.duration : task.duration * 24;
                return total + hours;
            }, 0);
        }
        
        function calculateTotalDays() {
            const totalHours = calculateTotalHours();
            return (totalHours / 24).toFixed(2);
        }
        
        function getAllPICs() {
            const uniquePICs = [...new Set(tasks.map(t => t.pic))];
            return uniquePICs.join(', ');
        }
        
        function updatePDFData() {
            document.getElementById('pdf-project-name').textContent = 
                document.getElementById('projectName').value || 'N/A';
            document.getElementById('pdf-project-manager').textContent = 
                document.getElementById('projectManager').value || 'N/A';
            document.getElementById('pdf-project-start').textContent = 
                document.getElementById('projectStartDate').value || 'N/A';
            document.getElementById('pdf-project-end').textContent = 
                document.getElementById('projectEndDate').value || 'N/A';
            
            document.getElementById('pdf-total-tasks').textContent = tasks.length;
            document.getElementById('pdf-total-hours').textContent = calculateTotalHours().toFixed(2) + ' hrs';
            document.getElementById('pdf-total-days').textContent = calculateTotalDays() + ' days';
            document.getElementById('pdf-all-pics').textContent = getAllPICs() || 'N/A';
        }
        
        function saveToLocalStorage() {
            const projectData = {
                projectName: document.getElementById('projectName').value,
                projectManager: document.getElementById('projectManager').value,
                projectStartDate: document.getElementById('projectStartDate').value,
                projectEndDate: document.getElementById('projectEndDate').value,
                tasks: tasks,
                ganttPeriod: ganttPeriodHours
            };
            localStorage.setItem('workScheduleProject', JSON.stringify(projectData));
        }
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('workScheduleProject');
            if (saved) {
                const projectData = JSON.parse(saved);
                document.getElementById('projectName').value = projectData.projectName || '';
                document.getElementById('projectManager').value = projectData.projectManager || '';
                document.getElementById('projectStartDate').value = projectData.projectStartDate || '';
                document.getElementById('projectEndDate').value = projectData.projectEndDate || '';
                tasks = projectData.tasks || [];
                ganttPeriodHours = projectData.ganttPeriod || 24;
                document.querySelectorAll('.period-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                const activeBtn = Array.from(document.querySelectorAll('.period-btn')).find(btn => {
                    return btn.textContent === ganttPeriodHours + 'H';
                });
                if (activeBtn) activeBtn.classList.add('active');
            }
        }
        
        function saveProject() {
            const projectData = {
                projectName: document.getElementById('projectName').value,
                projectManager: document.getElementById('projectManager').value,
                projectStartDate: document.getElementById('projectStartDate').value,
                projectEndDate: document.getElementById('projectEndDate').value,
                tasks: tasks
            };
            const dataStr = JSON.stringify(projectData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${projectData.projectName || 'project'}_${formatDate(new Date())}.json`;
            link.click();
            URL.revokeObjectURL(url);
            alert('Project saved successfully! 💾');
        }
        
        function loadProject() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const projectData = JSON.parse(event.target.result);
                        document.getElementById('projectName').value = projectData.projectName || '';
                        document.getElementById('projectManager').value = projectData.projectManager || '';
                        document.getElementById('projectStartDate').value = projectData.projectStartDate || '';
                        document.getElementById('projectEndDate').value = projectData.projectEndDate || '';
                        tasks = projectData.tasks || [];
                        renderTasks();
                        renderGanttChart();
                        updateStats();
                        saveToLocalStorage();
                        alert('Project loaded successfully! 📂');
                    } catch (error) {
                        alert('Error loading project file. Please make sure it\'s a valid project file.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function printToPDF() {
            if (tasks.length === 0) {
                alert('Please add tasks before exporting to PDF.');
                return;
            }
            
            updatePDFData();
            window.print();
        }
        
        setInterval(() => {
            if (tasks.length > 0) {
                saveToLocalStorage();
            }
        }, 30000);
        
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderGanttChart();
            }, 250);
        });
    </script>
</body>
</html>
